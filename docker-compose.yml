services:
  backend:
    build:
      context: ./phase10-backend
      dockerfile: Dockerfile
    container_name: phase10-backend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
    volumes:
      - ./phase10-backend:/app
      - backend_node_modules:/app/node_modules
    restart: unless-stopped

  frontend:
    build:
      context: ./phase10-frontend
      dockerfile: Dockerfile
    container_name: phase10-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://backend:3001
    volumes:
      - ./phase10-frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_node_modules:
  frontend_node_modules:
